name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, claude/**, copilot/**, codex/** ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,env,.venv
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,env,.venv

    - name: Type check with mypy
      run: |
        pip install mypy
        mypy . --ignore-missing-imports --exclude 'venv|env|.venv' || true

    - name: Run tests
      run: |
        pip install pytest pytest-cov
        if [ -d "tests" ]; then
          pytest tests/ --cov=. --cov-report=xml --cov-report=html
        else
          echo "No tests directory found, skipping tests"
        fi

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Check for vulnerabilities with Safety
      run: |
        if [ -f requirements.txt ]; then
          safety check --file=requirements.txt || true
        else
          echo "No requirements.txt found"
        fi

    - name: Security scan with Bandit
      run: |
        bandit -r . -f json -o bandit-report.json --exclude './venv,./env,./.venv' || true
        if [ -f bandit-report.json ]; then
          cat bandit-report.json
        fi

  build-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools wheel

    - name: Check package can be built
      run: |
        if [ -f setup.py ] || [ -f pyproject.toml ]; then
          python -m build
        else
          echo "No setup.py or pyproject.toml found, skipping build"
        fi

  notify:
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan, build-check]
    if: always()
    steps:
    - name: Send notification
      run: |
        echo "Pipeline completed with status: ${{ needs.lint-and-test.result }}"
        # Add Discord/Slack webhook notification here if configured
