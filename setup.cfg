[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    -p no:pytest_ethereum
    --cov=agents
    --cov=scripts
    --cov=api
    --cov=config
    --cov-report=term-missing
    --cov-report=html

[flake8]
max-line-length = 127
exclude =
    .git,
    __pycache__,
    venv,
    env,
    .venv,
    build,
    dist
ignore = E203, W503

[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
